<section class="relative overflow-hidden">
  <!-- Background with dynamic gradient -->
  <div class="bg-gradient-to-br {{gradient()}} text-white">
    <!-- Decorative background elements -->
    <div class="absolute top-0 right-0 -mt-20 -mr-20 w-96 h-96 bg-white/10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-0 left-0 -mb-20 -ml-20 w-80 h-80 bg-black/10 rounded-full blur-3xl"></div>

    <div class="container mx-auto px-6 py-10 md:py-14 relative z-10">
      <!-- Dynamic Breadcrumbs -->
      <nav class="flex items-center gap-3 text-xs md:text-sm text-white/80 mb-6 flex-wrap font-medium animate-fade-in">
        <a routerLink="/" class="hover:text-white transition-all flex items-center gap-1.5 group">
          <i class="fas fa-home text-[10px] group-hover:scale-110 transition-transform"></i>
          Home
        </a>
        
        @for (item of breadcrumbs(); track $index) {
          <span class="text-white/30 text-[10px]"><i class="fas fa-chevron-right"></i></span>
          @if (item.url) {
            <a [routerLink]="item.url" class="hover:text-white transition-all">{{item.label}}</a>
          } @else {
            <span class="text-white font-bold">{{item.label}}</span>
          }
        }
      </nav>

      <!-- Main Content Area -->
      <div class="flex flex-col md:flex-row items-start md:items-center gap-6 md:gap-8">
        <!-- Icon Container with Glassmorphism -->
        <div class="w-16 h-16 md:w-20 md:h-20 rounded-2xl md:rounded-[1.5rem] bg-white/20 backdrop-blur-xl flex items-center justify-center shadow-2xl ring-1 ring-white/40 group hover:rotate-6 transition-transform duration-500">
          <div class="w-11 h-11 md:w-14 md:h-14 rounded-xl bg-white/20 flex items-center justify-center shadow-inner">
            <i class="fas {{icon()}} text-2xl md:text-3xl text-white drop-shadow-lg group-hover:scale-110 transition-transform duration-500"></i>
          </div>
        </div>

        <!-- Title & Subtitle -->
        <div class="space-y-1">
          <h1 class="text-3xl md:text-5xl font-black tracking-tight text-white drop-shadow-sm italic">
            {{title()}}
          </h1>
          @if (subtitle()) {
            <p class="text-white/90 text-xs md:text-lg font-medium max-w-2xl leading-relaxed opacity-90">
              {{subtitle()}}
            </p>
          }
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom wave or curve (Optional premium touch) -->
  <div class="absolute bottom-0 left-0 right-0 h-4 bg-white dark:bg-[#0c0f17] rounded-t-[100%] scale-x-110 opacity-10"></div>
</section>
