<app-hero
  [title]="'Top Brands'"
  [subtitle]="'Shop from your favorite brands'"
  [icon]="'fa-tag'"
  [breadcrumbs]="brandsBreadcrumbs"
  [gradient]="'from-violet-600 via-indigo-500 to-purple-400'"
></app-hero>

<section class="container mx-auto px-4 py-12">
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 sm:gap-5">
    @for (brand of brandsList(); track brand._id) {
      <a
        [routerLink]="['/products']"
        [queryParams]="{ brand: brand._id, name: brand.name }"
        class="group bg-white dark:bg-[#151923] rounded-2xl border border-gray-100 dark:border-slate-800 p-4 sm:p-5 shadow-sm hover:shadow-xl dark:hover:shadow-slate-900/50 hover:border-violet-200 dark:hover:border-violet-800 transition-all duration-300 hover:-translate-y-1"
      >
        <div
          class="aspect-square rounded-xl overflow-hidden bg-gray-50 dark:bg-slate-800 mb-3 p-4 flex items-center justify-center"
        >
          <img [src]="brand.image" [alt]="brand.name" class="w-full h-48 object-contain" />
        </div>
        <h3
          class="font-semibold text-gray-900 dark:text-gray-100 text-center text-sm group-hover:text-violet-600 transition-colors truncate"
        >
          {{ brand.name }}
        </h3>
        <div
          class="flex justify-center mt-1.5 opacity-0 group-hover:opacity-100 transition-opacity"
        >
          <span class="text-xs text-violet-600 flex items-center gap-1"
            >View Products<svg
              data-prefix="fas"
              data-icon="arrow-right"
              class="svg-inline--fa fa-arrow-right text-2xs"
              role="img"
              viewBox="0 0 512 512"
              aria-hidden="true"
              width="10"
              height="10"
            >
              <path
                fill="currentColor"
                d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"
              ></path></svg
          ></span>
        </div>
      </a>
    }
  </div>
</section>
