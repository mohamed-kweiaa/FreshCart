<div class="bg-gray-50 dark:bg-[#0c0f17] min-h-screen pb-12 transition-colors duration-300">
  <!-- Top Banner -->
  <div class="bg-emerald-500 py-10 px-6 sm:px-12 md:px-20 text-white">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-start md:items-center gap-6">
      <div class="flex h-20 w-20 shrink-0 items-center justify-center rounded-full bg-white/20 text-white shadow-inner backdrop-blur-sm">
        <i class="far fa-user text-4xl"></i>
      </div>
      <div>
        <div class="text-sm font-medium opacity-80 mb-1">Home <span class="mx-1">/</span> My Account</div>
        <h1 class="text-3xl font-bold tracking-tight">{{ authService.currentUser()?.name || 'My Account' }}</h1>
        <p class="text-emerald-50 mt-1">{{ authService.currentUser()?.email }}</p>
      </div>
    </div>
  </div>

  <!-- Content Section -->
  <div class="max-w-7xl mx-auto px-6 sm:px-12 md:px-20 mt-8">
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
      
      <!-- Sidebar Navigation -->
      <div class="lg:col-span-1">
        <div class="bg-white dark:bg-[#151923] rounded-2xl shadow-sm border border-gray-100 dark:border-slate-800 p-4 sticky top-24">
          <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100 mb-4 px-2">My Account</h3>
          <nav class="space-y-1.5">
            <a 
              routerLink="/profile/addresses" 
              routerLinkActive="bg-emerald-50 text-emerald-600 border-emerald-100" 
              class="flex items-center justify-between px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 font-medium transition-all hover:bg-gray-50 dark:hover:bg-slate-800 border border-transparent"
            >
              <div class="flex items-center gap-3">
                <i class="fas fa-map-marker-alt w-5 text-center"></i>
                My Addresses
              </div>
              <i class="fas fa-chevron-right text-xs opacity-50"></i>
            </a>
            <a 
              routerLink="/profile/settings" 
              routerLinkActive="bg-emerald-50 text-emerald-600 border-emerald-100" 
              class="flex items-center justify-between px-4 py-3 rounded-xl text-gray-600 dark:text-gray-300 font-medium transition-all hover:bg-gray-50 dark:hover:bg-slate-800 border border-transparent"
            >
              <div class="flex items-center gap-3">
                <i class="fas fa-cog w-5 text-center"></i>
                Settings
              </div>
              <i class="fas fa-chevron-right text-xs opacity-50"></i>
            </a>
          </nav>
        </div>
      </div>

      <!-- Main Content Outlet -->
      <div class="lg:col-span-3">
        <router-outlet></router-outlet>
      </div>

    </div>
  </div>
</div>
